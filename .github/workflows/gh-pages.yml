name: gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/jfe-pages
          git worktree add --detach /tmp/jfe-pages
          cd /tmp/jfe-pages
          git switch --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          find . -mindepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .
          git add .
          git commit -m "Deploy GitHub Pages"
          git push -f origin gh-pages
